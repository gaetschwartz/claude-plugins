  vlan:                 ["vlan", "virtual lan"]
  ecmp:                 ["ecmp", "equal-cost multi-path"]
  acl:                  ["acl", "access control list"]
  qos:                  ["qos", "quality of service"]
  l2:                   ["l2", "layer 2"]
  l3:                   ["l3", "layer 3"]
  l4:                   ["l4", "layer 4"]
