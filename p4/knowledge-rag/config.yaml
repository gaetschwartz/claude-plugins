  p4info:               ["p4info", "p4 info"]

  # --- Hardware concepts ---
  phv:                  ["phv", "packet header vector"]
  mau:                  ["mau", "match-action unit"]
  tcam:                 ["tcam", "ternary cam", "ternary content-addressable memory"]
  sram:                 ["sram", "static ram"]
  tm:                   ["traffic manager", "tm"]
